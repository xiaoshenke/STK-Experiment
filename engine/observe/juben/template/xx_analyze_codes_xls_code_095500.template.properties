juben=XX_analyze-codes(分析个股的实时信息 xls-code分支)
juben_tips=因为是xls-code分支,那么是能够获取到对应的题材信息的\n\
关注的信息包括:锚定数据(题材+切片) 前排数据(题材+切片) 强度(题材)(日内+日间) 早盘走势(题材+切片)

category=tracing
replace=xls_code
sort=2
max_size=200

enable_realtime_xls=0
enable_bkzj_df=0

# 上半部分是题材的数据 下班部分是切片的数据 严格分开 否则太乱了..
# 锚定数据 前排数据 强度(日内+日间) 早盘走势
eva0=xx*get_xls->stage:zijin.hist[09:26:00,],\
xx*get_xls->upstp*ban_size,\
print_fenge,\
if xx->upstp then xx->upstp*ban_size,\
if xx*20cm->rup:min=11 then xx*20cm->rup:min=8,\
if xx->rup3*alot2,\
if xx->rup5*filter:min=10,\
if xx->rup5*filter:min=3 then xx->btw:min=3:limit=10,\
if xx*simple_code then xx->stage:trend3.cross,\
if xx->opp:min=2*alot2 then xx->opp:min=2:limit=15[09:30:30,09:45:00],\
xx->stage:trend3.hist[09:25:00,]
