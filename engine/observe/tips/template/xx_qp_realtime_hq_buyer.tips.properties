\n\
\n\
注意: 本策略主要从强度,图形和逻辑等三个角度来考虑问题#\
\n\
\n\
依旧是对切片买点的几个灵魂拷问:先思考这个切片的确定性来源于哪里#\
是来自本身强度明显超过了往期?#\
是来自对应题材的确定性?#\
是来自指数层面的普涨?#\
只有清楚的知道了确定性来源 才能临盘的时候更加的冷静和确定#\
\n\

