\n\
本模板也是我[最看重]的题材锚定工具#\
\n\
\n\
总体思路: 根据题材的近期图形和实时的数据指标给出锚定 具体包括:#\
涨停板 #\
核心个股 #\
bkzj流入数据 #\
题材大致走势 #\
先阐述一些事实：#\
1* 题材的锚定和题材过去几个交易日的走势的状态有关->题材的内生性要素 #\
2 题材的锚定和市场的行情也强相关#\
3 正常行情下 比如震荡 普涨行情下 题材的锚定就是那几个标准的指标：\
涨停板 核心个股(可以是权重 也可以是弹性) bkzj流入数据 市场的竞争结果 \
20cm的锚定#\
4 特殊行情 比如弱势行情 能否形成逆势#\
\n\
\n\
